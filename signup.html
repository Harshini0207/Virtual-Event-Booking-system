<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#56B6C6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:24px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
text-align:center;
width:380px;
}

.container h1{
font-size:32px;
margin-bottom:18px;
color:#333;
}

input{
width:88%;
padding:12px;
margin:9px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

button{
padding:10px 24px;
margin-top:12px;
font-size:15px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056b3;
transform:scale(1.05);
}
</style>

</head>
<body>

<div class="container">

<h1>Signup</h1>

<form action="/signup" method="post">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<input type="text" name="phone" placeholder="Phone" required>

<button type="submit">Signup</button>

</form>

</div>

</body>
</html>
