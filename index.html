<!DOCTYPE html>
<html>
<head>
<title>Virtual Event Booking</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#56B6C6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
width:460px;
}

.container h1{
font-size:40px;
margin-bottom:10px;
color:#333;
}

.container p{
font-size:16px;
color:#666;
margin-bottom:25px;
}

.buttons{
display:flex;
justify-content:center;
gap:18px;
}

.buttons a{
text-decoration:none;
}

.buttons button{
padding:12px 24px;
font-size:16px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
cursor:pointer;
transition:0.3s;
}

.buttons button:hover{
background:#0056b3;
transform:scale(1.05);
}
</style>

</head>
<body>

<div class="container">

<h1>Virtual Event Booking</h1>
<p>Book and manage events easily</p>

<div class="buttons">
<a href="signup.html"><button>Signup</button></a>
<a href="login.html"><button>Login</button></a>
</div>

</div>

</body>
</html>
